name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, with or without a leading v
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Sync assets and tag release
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Resolve release version
        id: version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          version="${RELEASE_VERSION}"
          version="${version#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Release versions must look like 0.1.0; got ${RELEASE_VERSION}" >&2
            exit 1
          fi

          tag="v${version}"
          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Stage embedded frontend assets
        run: bun run build:stage

      - name: Commit embedded assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/webassets/dist

          if git diff --cached --quiet; then
            echo "Embedded frontend assets already current"
            exit 0
          fi

          git commit -m "Stage embedded frontend assets for ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main

      - name: Create and push release tag
        shell: bash
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Gorchestra ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Start release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "${{ steps.version.outputs.tag }}"
