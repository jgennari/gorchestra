name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Release tags must look like v0.1.0; got $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Stage embedded frontend assets
        run: bun run build:stage

      - name: Verify embedded assets are committed
        run: git diff --exit-code -- internal/webassets/dist

      - name: Test backend
        run: go test ./...

      - name: Build release archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bun run release:archives

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --verify-tag \
            --title "Gorchestra ${{ steps.version.outputs.tag }}" \
            --generate-notes
