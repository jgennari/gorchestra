name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Release tags must look like v0.1.0; got $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Stage embedded frontend assets
        run: bun run build:stage

      - name: Verify embedded assets are committed
        run: git diff --exit-code -- internal/webassets/dist

      - name: Test backend
        run: go test ./...

      - name: Build release archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bun run release:archives

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.version.outputs.tag }}" \
              dist/*.tar.gz \
              dist/*.zip \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "${{ steps.version.outputs.tag }}" \
              dist/*.tar.gz \
              dist/*.zip \
              dist/SHA256SUMS \
              --verify-tag \
              --title "Gorchestra ${{ steps.version.outputs.tag }}" \
              --generate-notes
          fi

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve tap version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Release tags must look like v0.1.0; got $tag" >&2
            exit 1
          fi
          source_url="https://github.com/jgennari/gorchestra/archive/refs/tags/${tag}.tar.gz"
          source_sha="$(curl -L -sSf "$source_url" | shasum -a 256 | awk '{print $1}')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "source_url=$source_url" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: jgennari/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_SHA256: ${{ steps.version.outputs.source_sha }}
        shell: bash
        run: |
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/gorchestra.rb.template homebrew-tap/Formula/gorchestra.rb
          perl -0pi -e 's/\{\{VERSION\}\}/$ENV{VERSION}/g; s/\{\{SOURCE_SHA256\}\}/$ENV{SOURCE_SHA256}/g' homebrew-tap/Formula/gorchestra.rb

      - name: Commit tap update
        working-directory: homebrew-tap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gorchestra.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "Update gorchestra to ${{ steps.version.outputs.version }}"
          git push
